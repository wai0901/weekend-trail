<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekend Trail | Wai & Mrs.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #fff; }
        .hero-gradient { background: radial-gradient(ellipse 80% 60% at 50% -20%, rgba(124, 58, 237, 0.35), transparent); }
        .img-wrapper { height: 220px; overflow: hidden; }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="min-h-screen">
    <section class="hero-gradient pt-16 pb-12 px-6 text-center">
        <h1 class="text-4xl md:text-5xl font-black mb-4">Weekend Trail</h1>
        <p class="text-zinc-400">大佬同太太嘅海邊漫步路線</p>
    </section>

    <div class="max-w-2xl mx-auto px-6 pb-20 space-y-6">
        <!-- 1 -->
        <div class="bg-zinc-900 rounded-2xl overflow-hidden border border-zinc-800">
            <div class="img-wrapper"><img src="images/dana.jpg" alt="Dana Point"></div>
            <div class="p-6">
                <h2 class="text-xl font-bold mb-2">Dana Point Headlands</h2>
                <p class="text-zinc-400 text-sm mb-4">懸崖海岸徑，視野遼闊，適合週末拍拖散步。</p>
                <a href="https://maps.google.com/?q=Dana+Point+Headlands+Conservation+Area" class="text-sky-400 text-sm">查看地圖 →</a>
            </div>
        </div>
        <!-- 2 -->
        <div class="bg-zinc-900 rounded-2xl overflow-hidden border border-zinc-800">
            <div class="img-wrapper"><img src="images/bolsa.jpg" alt="Bolsa Chica"></div>
            <div class="p-6">
                <h2 class="text-xl font-bold mb-2">Bolsa Chica Reserve</h2>
                <p class="text-zinc-400 text-sm mb-4">平坦舒適木棧道，睇雀鳥睇生態環境最一流。</p>
                <a href="https://maps.google.com/?q=Bolsa+Chica+Ecological+Reserve" class="text-sky-400 text-sm">查看地圖 →</a>
            </div>
        </div>
        <!-- 3 -->
        <div class="bg-zinc-900 rounded-2xl overflow-hidden border border-zinc-800">
            <div class="img-wrapper"><img src="about:blank" style="display:none;" alt="Crystal Cove"></div>
            <div class="p-6">
                <h2 class="text-xl font-bold mb-2">Crystal Cove</h2>
                <p class="text-zinc-400 text-sm mb-4">海岸線靚徑，行完可以去 Shake Shack 飲嘢睇日落。</p>
                <a href="https://maps.google.com/?q=Crystal+Cove+State+Park" class="text-sky-400 text-sm">查看地圖 →</a>
            </div>
        </div>
    </div>
</body>
</html>
